{% extends "blogs/base.html" %}

{% block content %}    
    <p>Add a new topic:</p>
    {# The blogs is the namespace and the new_blog tells the django to look into the urls.py for the path #}
    <form action="{% url 'blogs:new_blog' %}" method='post'>   
        {% csrf_token %}
        {{ form.as_div }}
        <button name="submit">Add topic</button>
    </form>
{% endblock content %}
